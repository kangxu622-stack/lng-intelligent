<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 基座 -->
  <rect x="40" y="140" width="100" height="20" rx="3" fill="#4a5568"/>
  
  <!-- 下臂 -->
  <path d="M60 140 L70 100 L90 100 L100 140 Z" fill="#718096"/>
  
  <!-- 中臂 -->
  <path d="M70 100 L85 60 L105 60 L90 100 Z" fill="#a0aec0"/>
  
  <!-- 上臂 -->
  <path d="M85 60 L100 30 L120 30 L105 60 Z" fill="#cbd5e0"/>
  
  <!-- 旋转关节 -->
  <circle cx="90" cy="100" r="8" fill="#e2e8f0"/>
  <circle cx="90" cy="100" r="4" fill="#4a5568"/>
  
  <circle cx="105" cy="60" r="6" fill="#e2e8f0"/>
  <circle cx="105" cy="60" r="3" fill="#4a5568"/>
  
  <!-- 连接法兰 -->
  <rect x="95" y="20" width="30" height="10" rx="2" fill="#718096"/>
  <circle cx="110" cy="25" r="3" fill="#4a5568"/>
  
  <!-- 液压管 -->
  <path d="M50 130 Q60 110 75 95" stroke="#e53e3e" stroke-width="3" fill="none"/>
  <path d="M55 130 Q65 115 80 100" stroke="#e53e3e" stroke-width="3" fill="none"/>
  
  <!-- 状态指示灯 -->
  <circle cx="130" cy="40" r="5" fill="#48bb78">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- 标签 -->
  <text x="90" y="170" text-anchor="middle" fill="#ffffff" font-size="10" font-family="Arial">卸船臂</text>
</svg>
