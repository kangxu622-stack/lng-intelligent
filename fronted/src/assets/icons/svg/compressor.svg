<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 基座 -->
  <rect x="40" y="145" width="100" height="15" rx="3" fill="#4a5568"/>
  
  <!-- 压缩机主体 -->
  <rect x="55" y="80" width="70" height="65" rx="5" fill="#2d3748" stroke="#4a5568" stroke-width="2"/>
  
  <!-- 进气口 -->
  <rect x="45" y="95" width="10" height="15" fill="#4299e1"/>
  <path d="M35 102 L45 102" stroke="#4299e1" stroke-width="4" stroke-linecap="round"/>
  
  <!-- 出气口 -->
  <rect x="125" y="95" width="10" height="15" fill="#f6ad55"/>
  <path d="M135 102 L145 102" stroke="#f6ad55" stroke-width="4" stroke-linecap="round"/>
  
  <!-- 电机 -->
  <circle cx="90" cy="65" r="18" fill="#718096" stroke="#2d3748" stroke-width="2"/>
  <circle cx="90" cy="65" r="10" fill="#4a5568"/>
  
  <!-- 旋转叶片 -->
  <g>
    <ellipse cx="90" cy="65" rx="8" ry="3" fill="#cbd5e0">
      <animateTransform attributeName="transform" type="rotate" from="0 90 65" to="360 90 65" dur="1s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="90" cy="65" rx="8" ry="3" fill="#cbd5e0">
      <animateTransform attributeName="transform" type="rotate" from="90 90 65" to="450 90 65" dur="1s" repeatCount="indefinite"/>
    </ellipse>
  </g>
  
  <!-- 连接螺栓 -->
  <circle cx="60" cy="85" r="2" fill="#e2e8f0"/>
  <circle cx="120" cy="85" r="2" fill="#e2e8f0"/>
  <circle cx="60" cy="140" r="2" fill="#e2e8f0"/>
  <circle cx="120" cy="140" r="2" fill="#e2e8f0"/>
  
  <!-- 压力表 -->
  <circle cx="75" cy="105" r="6" fill="#e2e8f0" stroke="#4a5568" stroke-width="1"/>
  <text x="75" y="107" text-anchor="middle" fill="#2d3748" font-size="4" font-family="Arial">P1</text>
  
  <circle cx="105" cy="105" r="6" fill="#e2e8f0" stroke="#4a5568" stroke-width="1"/>
  <text x="105" y="107" text-anchor="middle" fill="#2d3748" font-size="4" font-family="Arial">P2</text>
  
  <!-- 振动传感器 -->
  <circle cx="90" cy="125" r="4" fill="#fc8181"/>
  
  <!-- 状态灯 -->
  <circle cx="135" cy="50" r="4" fill="#48bb78">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- 标签 -->
  <text x="90" y="170" text-anchor="middle" fill="#ffffff" font-size="10" font-family="Arial">BOG 压缩机</text>
</svg>
